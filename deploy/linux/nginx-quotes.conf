# /etc/nginx/sites-available/mt5-quotes
# sudo ln -s /etc/nginx/sites-available/mt5-quotes /etc/nginx/sites-enabled/

upstream mt5_quotes {
    server 127.0.0.1:9528;
}

server {
    listen 80;
    server_name quotes.example.com;

    location / {
        proxy_pass http://mt5_quotes;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
